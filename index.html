<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guardián del Teclado AR</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #camera {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    #threeCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 17;
      pointer-events: none;
    }

    .panel {
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 430px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      text-align: center;
      z-index: 30;
      backdrop-filter: blur(8px);
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .panel p {
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .secondary-button {
    background: rgba(255, 255, 255, 0.18);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.45);
    }

    button:active {
      transform: scale(0.97);
    }

    #status {
      margin-top: 10px;
      color: #ddd;
      font-size: 13px;
    }

    .sensitivity-box {
      margin-top: 10px;
      font-size: 13px;
      color: #eee;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 6px;
    }

    .keyboard-zone {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 96%;
      height: 45%;
      border: 4px dashed rgba(255, 50, 50, 0.95);
      border-radius: 24px 24px 0 0;
      background: rgba(255, 0, 0, 0.16);
      color: white;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 19px;
      text-shadow: 0 2px 5px black;
      pointer-events: none;
    }

    .keyboard-zone.danger {
      background: rgba(255, 0, 0, 0.35);
      border-color: white;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.95);
    }

    .keyboard-zone span {
      background: rgba(0, 0, 0, 0.68);
      padding: 12px 16px;
      border-radius: 14px;
    }

    .guardian {
      position: fixed;
      left: 50%;
      bottom: 48%;
      transform: translateX(-50%);
      font-size: 82px;
      z-index: 18;
      filter: drop-shadow(0 6px 10px black);
      pointer-events: none;
      display: none;
    }

    .guardian.idle {
      animation: floating 1.8s infinite ease-in-out;
    }

    @keyframes floating {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }

    .guardian.attack {
      animation: swordAttack 0.9s ease-in-out;
    }

    @keyframes swordAttack {
      0% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
      25% {
        transform: translateX(-95%) translateY(30px) scale(1.25) rotate(-25deg);
      }
      50% {
        transform: translateX(10%) translateY(80px) scale(1.55) rotate(25deg);
      }
      75% {
        transform: translateX(-50%) translateY(25px) scale(1.2) rotate(-10deg);
      }
      100% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
    }

    .slash {
      position: fixed;
      left: 50%;
      bottom: 25%;
      transform: translateX(-50%) rotate(-25deg);
      width: 230px;
      height: 35px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 18px white,
        0 0 35px rgba(255, 0, 0, 0.95);
      z-index: 19;
      opacity: 0;
      pointer-events: none;
    }

    .slash.show {
      animation: slashEffect 0.35s ease-out;
    }

    @keyframes slashEffect {
      0% {
        opacity: 0;
        width: 60px;
      }
      40% {
        opacity: 1;
        width: 260px;
      }
      100% {
        opacity: 0;
        width: 300px;
      }
    }

    .warning {
      position: fixed;
      left: 50%;
      top: 39%;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.86);
      color: #ff4b4b;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      z-index: 40;
      display: none;
      text-shadow: 0 2px 4px black;
      pointer-events: none;
    }

    .warning.show {
      display: block;
      animation: shake 0.18s infinite;
    }

    @keyframes shake {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      25% {
        transform: translateX(-52%) translateY(-2px);
      }
      50% {
        transform: translateX(-48%) translateY(2px);
      }
      75% {
        transform: translateX(-52%) translateY(2px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>

<body>

  <video id="camera" autoplay playsinline muted></video>

  <canvas id="threeCanvas"></canvas>

  <div class="panel">
    <h1>Guardián del Teclado AR</h1>
    <p>Activa la cámara y apunta la zona roja hacia el teclado.</p>

    <button id="startCamera">
      Activar cámara
    </button>

    <button id="recalibrateButton" class="secondary-button" style="display: none;">
        Recalibrar zona
    </button>

    <p id="status">Cámara apagada.</p>

    <div class="sensitivity-box">
      Sensibilidad del movimiento
      <input id="sensitivity" type="range" min="2" max="18" value="7">
    </div>
  </div>

  <div id="guardian" class="guardian idle">
    🐶🗡️
  </div>

  <div id="keyboardZone" class="keyboard-zone">
    <span>
      ZONA PROTEGIDA DEL TECLADO<br>
      si algo se mueve aquí, ataco
    </span>
  </div>

  <div id="slash" class="slash"></div>

  <div id="warning" class="warning">
    ¡NO TOQUES EL TECLADO!
  </div>

  <script type="module">
    import * as THREE from "three";

  const video = document.getElementById("camera");
  const button = document.getElementById("startCamera");
  const recalibrateButton = document.getElementById("recalibrateButton");
  const statusText = document.getElementById("status");
  const sensitivityInput = document.getElementById("sensitivity");

  const keyboardZone = document.getElementById("keyboardZone");
  const guardian = document.getElementById("guardian");
  const slash = document.getElementById("slash");
  const warning = document.getElementById("warning");

  const motionCanvas = document.createElement("canvas");
  const motionCtx = motionCanvas.getContext("2d", {
    willReadFrequently: true
  });

  let cameraStarted = false;
  let baseFrame = null;
  let attacking = false;
  let lastAttackTime = 0;
  let isCalibrating = false;

  let intrusionActive = false; 
  let intrusionFrames = 0;
  let clearFrames = 0;

  let scene3D;
  let camera3D;
  let renderer3D;
  let guardian3D;
  let sword3D;
  let slash3D;

  let attack3DActive = false;
  let attack3DStartTime = 0;

    function setupMotionCanvas() {
      motionCanvas.width = 220;
      motionCanvas.height = Math.round(220 * window.innerHeight / window.innerWidth);
    }

    setupMotionCanvas();
    window.addEventListener("resize", setupMotionCanvas);

    function initThreeScene() {
    const canvas = document.getElementById("threeCanvas");

    scene3D = new THREE.Scene();

    camera3D = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );

    camera3D.position.z = 6;

    renderer3D = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true
    });

    renderer3D.setSize(window.innerWidth, window.innerHeight);
    renderer3D.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene3D.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
    directionalLight.position.set(2, 4, 5);
    scene3D.add(directionalLight);

    guardian3D = new THREE.Group();

    const bodyGeometry = new THREE.SphereGeometry(0.55, 32, 32);
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0x8b5a2b,
      roughness: 0.55
    });

    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.scale.set(1, 1.15, 0.75);
    guardian3D.add(body);

    const headGeometry = new THREE.SphereGeometry(0.42, 32, 32);
    const headMaterial = new THREE.MeshStandardMaterial({
      color: 0xb8793a,
      roughness: 0.5
    });

    const head = new THREE.Mesh(headGeometry, headMaterial);
    head.position.set(0, 0.72, 0);
    guardian3D.add(head);

    const earGeometry = new THREE.ConeGeometry(0.16, 0.35, 24);
    const earMaterial = new THREE.MeshStandardMaterial({
      color: 0x5a351e
    });

    const leftEar = new THREE.Mesh(earGeometry, earMaterial);
    leftEar.position.set(-0.28, 1.1, 0);
    leftEar.rotation.z = 0.25;
    guardian3D.add(leftEar);

    const rightEar = new THREE.Mesh(earGeometry, earMaterial);
    rightEar.position.set(0.28, 1.1, 0);
    rightEar.rotation.z = -0.25;
    guardian3D.add(rightEar);

    const eyeGeometry = new THREE.SphereGeometry(0.055, 16, 16);
    const eyeMaterial = new THREE.MeshStandardMaterial({
      color: 0x000000
    });

    const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    leftEye.position.set(-0.15, 0.78, 0.38);
    guardian3D.add(leftEye);

    const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    rightEye.position.set(0.15, 0.78, 0.38);
    guardian3D.add(rightEye);

    const swordGroup = new THREE.Group();

    const bladeGeometry = new THREE.BoxGeometry(0.09, 1.25, 0.06);
    const bladeMaterial = new THREE.MeshStandardMaterial({
      color: 0xdfe7ef,
      metalness: 0.8,
      roughness: 0.25
    });

    const blade = new THREE.Mesh(bladeGeometry, bladeMaterial);
    blade.position.y = 0.45;
    swordGroup.add(blade);

    const handleGeometry = new THREE.BoxGeometry(0.14, 0.45, 0.08);
    const handleMaterial = new THREE.MeshStandardMaterial({
      color: 0x2d1b10
    });

    const handle = new THREE.Mesh(handleGeometry, handleMaterial);
    handle.position.y = -0.35;
    swordGroup.add(handle);

    const guardGeometry = new THREE.BoxGeometry(0.55, 0.08, 0.08);
    const guardMaterial = new THREE.MeshStandardMaterial({
      color: 0xffcc33
    });

    const guard = new THREE.Mesh(guardGeometry, guardMaterial);
    guard.position.y = -0.1;
    swordGroup.add(guard);

    sword3D = swordGroup;
    sword3D.position.set(0.65, 0.1, 0.15);
    sword3D.rotation.z = -0.65;

    guardian3D.add(sword3D);

    const slashGeometry = new THREE.TorusGeometry(0.75, 0.035, 12, 80, Math.PI);
    const slashMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0
    });

    slash3D = new THREE.Mesh(slashGeometry, slashMaterial);
    slash3D.position.set(0.25, -0.1, 0.5);
    slash3D.rotation.z = -0.75;
    guardian3D.add(slash3D);

    guardian3D.position.set(0, -0.2, 0);
    guardian3D.scale.set(1.25, 1.25, 1.25);

    scene3D.add(guardian3D);

    window.addEventListener("resize", resizeThreeScene);

    animateThreeScene();
  }

  function resizeThreeScene() {
    if (!camera3D || !renderer3D) return;

    camera3D.aspect = window.innerWidth / window.innerHeight;
    camera3D.updateProjectionMatrix();

    renderer3D.setSize(window.innerWidth, window.innerHeight);
  }

  function animateThreeScene() {
    requestAnimationFrame(animateThreeScene);

    if (!guardian3D) return;

    const time = performance.now() * 0.001;

    guardian3D.position.y = -0.15 + Math.sin(time * 2) * 0.08;

    if (attack3DActive) {
      const elapsed = performance.now() - attack3DStartTime;
      const progress = Math.min(elapsed / 700, 1);

      guardian3D.rotation.z = Math.sin(progress * Math.PI * 2) * 0.25;
      guardian3D.scale.setScalar(1.25 + Math.sin(progress * Math.PI) * 0.45);

      sword3D.rotation.z = -0.65 + Math.sin(progress * Math.PI) * 2.2;

      slash3D.material.opacity = Math.sin(progress * Math.PI);
      slash3D.scale.setScalar(0.8 + progress * 1.3);

      if (progress >= 1) {
        attack3DActive = false;
        guardian3D.rotation.z = 0;
        guardian3D.scale.set(1.25, 1.25, 1.25);
        sword3D.rotation.z = -0.65;
        slash3D.material.opacity = 0;
        slash3D.scale.set(1, 1, 1);
      }
    }

    renderer3D.render(scene3D, camera3D);
  }

  function trigger3DAttack() {
    attack3DActive = true;
    attack3DStartTime = performance.now();
  }

  async function startCamera() {
    try {
      statusText.textContent = "Solicitando permiso de cámara...";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusText.textContent = "Tu navegador no permite usar cámara aquí. Usa Chrome con HTTPS.";
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: {
            ideal: "environment"
          },
          width: {
            ideal: 1280
          },
          height: {
            ideal: 720
          }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      cameraStarted = true;
      button.style.display = "none";
      recalibrateButton.style.display = "block";

      await startCalibrationCountdown();

      detectIntrusion();

    } catch (error) {
      console.error("Error al abrir cámara:", error);

      if (error.name === "NotAllowedError") {
        statusText.textContent = "Permiso denegado. Debes permitir acceso a la cámara.";
      } else if (error.name === "NotFoundError") {
        statusText.textContent = "No se encontró cámara disponible.";
      } else {
        statusText.textContent = "Error al abrir la cámara. Revisa permisos o HTTPS.";
      }
    }
  }

  async function startCalibrationCountdown() {
    isCalibrating = true;
    keyboardZone.classList.remove("danger");

    statusText.textContent = "Apunta la zona roja al teclado. Calibrando en 3...";
    await wait(700);

    statusText.textContent = "Mantén el celular quieto. Calibrando en 2...";
    await wait(700);
 
    statusText.textContent = "No metas la mano todavía. Calibrando en 1...";
    await wait(700);

    calibrateKeyboardZone();

    statusText.textContent = "Zona calibrada. Ahora si algo invade el teclado, ataco.";
  }

  function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
  }

  function calibrateKeyboardZone() {
    if (!cameraStarted || video.readyState < 2) return;

    isCalibrating = true;
    intrusionActive = false;
    intrusionFrames = 0;
    clearFrames = 0;
    
    keyboardZone.classList.remove("danger");

    drawVideoCoverToCanvas();

    const zone = getKeyboardZoneInCanvas();

    baseFrame = motionCtx.getImageData(
        zone.x,
        zone.y,
        zone.width,
        zone.height
    );

    isCalibrating = false;

    statusText.textContent = "Zona calibrada. Ahora si algo invade el teclado, ataco.";
  }

  function detectIntrusion() {
    if (!cameraStarted || video.readyState < 2) {
      requestAnimationFrame(detectIntrusion);
      return;
    }

    if (!baseFrame || isCalibrating) {
      requestAnimationFrame(detectIntrusion);
      return;
    }

    drawVideoCoverToCanvas();

    const zone = getKeyboardZoneInCanvas();

    const currentFrame = motionCtx.getImageData(
      zone.x,
      zone.y,
      zone.width,
      zone.height
    );

    const intrusionPercent = calculateChangePercent(
      baseFrame.data,
      currentFrame.data
    );

    const sensitivity = Number(sensitivityInput.value);

    /*
      Menor sensibilidad = necesita menos cambio para atacar.
      Mayor sensibilidad = necesita más cambio para atacar.
    */
    const threshold = sensitivity / 100;

    const isIntrusion = intrusionPercent > threshold;

    if (isIntrusion) {
      intrusionFrames++;
      clearFrames = 0;

      keyboardZone.classList.add("danger");

      statusText.textContent =
        "Objeto dentro de la zona. Cambio: " +
        Math.round(intrusionPercent * 100) +
        "%";

      /*
        Solo ataca cuando la invasión acaba de comenzar.
        Si el objeto sigue dentro, no repite el ataque.
      */
      if (!intrusionActive && intrusionFrames >= 4) {
        intrusionActive = true;
        tryAttack();
      }

    } else {
      clearFrames++;
      intrusionFrames = 0;

      statusText.textContent =
        "Vigilando teclado. Cambio: " +
        Math.round(intrusionPercent * 100) +
        "%";

        /*
            Solo se rearma cuando la zona estuvo limpia
            varios frames seguidos.
        */
      if (clearFrames >= 10) {
            intrusionActive = false;
            keyboardZone.classList.remove("danger");
      }
    }

    requestAnimationFrame(detectIntrusion);
  }

  function drawVideoCoverToCanvas() {
    const canvasWidth = motionCanvas.width;
    const canvasHeight = motionCanvas.height;

    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;

    if (!videoWidth || !videoHeight) return;

    const videoRatio = videoWidth / videoHeight;
    const canvasRatio = canvasWidth / canvasHeight;

    let sx = 0;
    let sy = 0;
    let sw = videoWidth;
    let sh = videoHeight;

    if (videoRatio > canvasRatio) {
      sh = videoHeight;
      sw = sh * canvasRatio;
      sx = (videoWidth - sw) / 2;
    } else {
      sw = videoWidth;
      sh = sw / canvasRatio;
      sy = (videoHeight - sh) / 2;
    }

    motionCtx.drawImage(
      video,
      sx,
      sy,
      sw,
      sh,
      0,
      0,
      canvasWidth,
      canvasHeight
    );
  }

  function getKeyboardZoneInCanvas() {
    const rect = keyboardZone.getBoundingClientRect();

    const scaleX = motionCanvas.width / window.innerWidth;
    const scaleY = motionCanvas.height / window.innerHeight;

    const x = Math.max(0, Math.floor(rect.left * scaleX));
    const y = Math.max(0, Math.floor(rect.top * scaleY));

    const width = Math.min(
      motionCanvas.width - x,
      Math.floor(rect.width * scaleX)
    );

    const height = Math.min(
      motionCanvas.height - y,
      Math.floor(rect.height * scaleY)
    );

    return {
      x,
      y,
      width,
      height
    };
  }

  function calculateChangePercent(base, current) {
    let changedPixels = 0;
    let totalPixels = 0;

    for (let i = 0; i < current.length; i += 20) {
      const rDiff = Math.abs(current[i] - base[i]);
      const gDiff = Math.abs(current[i + 1] - base[i + 1]);
      const bDiff = Math.abs(current[i + 2] - base[i + 2]);

      const diff = rDiff + gDiff + bDiff;

      if (diff > 65) {
        changedPixels++;
      }

      totalPixels++;
    }

    return changedPixels / totalPixels;
  }

  function tryAttack() {
    const now = Date.now();
    const cooldownMs = 1500;

    if (now - lastAttackTime < cooldownMs) {
      return;
    }

    lastAttackTime = now;
    attack();
  }

  function attack() {
    if (attacking) return;

    attacking = true;

    guardian.classList.remove("idle");
    guardian.classList.remove("attack");
    slash.classList.remove("show");
    warning.classList.remove("show");

    void guardian.offsetWidth;
    void slash.offsetWidth;

    guardian.classList.add("attack");
    slash.classList.add("show");
    warning.classList.add("show");

    setTimeout(() => {
      guardian.classList.remove("attack");
      guardian.classList.add("idle");
      slash.classList.remove("show");
      warning.classList.remove("show");
      attacking = false;
    }, 1100);
  }

  sensitivityInput.addEventListener("input", () => {
    statusText.textContent = "Sensibilidad ajustada. Mantén el celular quieto.";
  });

  button.addEventListener("click", startCamera);
  recalibrateButton.addEventListener("click", async () => {
  await startCalibrationCountdown();
});
</script>
  </script>

</body>
</html>
