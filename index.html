<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guardián del Teclado AR</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #camera {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    .panel {
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 430px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      text-align: center;
      z-index: 30;
      backdrop-filter: blur(8px);
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .panel p {
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    #status {
      margin-top: 10px;
      color: #ddd;
      font-size: 13px;
    }

    .sensitivity-box {
      margin-top: 10px;
      font-size: 13px;
      color: #eee;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 6px;
    }

    .keyboard-zone {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 96%;
      height: 45%;
      border: 4px dashed rgba(255, 50, 50, 0.95);
      border-radius: 24px 24px 0 0;
      background: rgba(255, 0, 0, 0.16);
      color: white;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 19px;
      text-shadow: 0 2px 5px black;
    }

    .keyboard-zone.danger {
      background: rgba(255, 0, 0, 0.35);
      border-color: white;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.95);
    }

    .keyboard-zone span {
      background: rgba(0, 0, 0, 0.68);
      padding: 12px 16px;
      border-radius: 14px;
    }

    .guardian {
      position: fixed;
      left: 50%;
      bottom: 48%;
      transform: translateX(-50%);
      font-size: 82px;
      z-index: 18;
      filter: drop-shadow(0 6px 10px black);
      pointer-events: none;
    }

    .guardian.idle {
      animation: floating 1.8s infinite ease-in-out;
    }

    @keyframes floating {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }

    .guardian.attack {
      animation: swordAttack 0.9s ease-in-out;
    }

    @keyframes swordAttack {
      0% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
      25% {
        transform: translateX(-95%) translateY(30px) scale(1.25) rotate(-25deg);
      }
      50% {
        transform: translateX(10%) translateY(80px) scale(1.55) rotate(25deg);
      }
      75% {
        transform: translateX(-50%) translateY(25px) scale(1.2) rotate(-10deg);
      }
      100% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
    }

    .slash {
      position: fixed;
      left: 50%;
      bottom: 25%;
      transform: translateX(-50%) rotate(-25deg);
      width: 230px;
      height: 35px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 18px white,
        0 0 35px rgba(255, 0, 0, 0.95);
      z-index: 19;
      opacity: 0;
      pointer-events: none;
    }

    .slash.show {
      animation: slashEffect 0.35s ease-out;
    }

    @keyframes slashEffect {
      0% {
        opacity: 0;
        width: 60px;
      }
      40% {
        opacity: 1;
        width: 260px;
      }
      100% {
        opacity: 0;
        width: 300px;
      }
    }

    .warning {
      position: fixed;
      left: 50%;
      top: 39%;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.86);
      color: #ff4b4b;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      z-index: 40;
      display: none;
      text-shadow: 0 2px 4px black;
      pointer-events: none;
    }

    .warning.show {
      display: block;
      animation: shake 0.18s infinite;
    }

    @keyframes shake {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      25% {
        transform: translateX(-52%) translateY(-2px);
      }
      50% {
        transform: translateX(-48%) translateY(2px);
      }
      75% {
        transform: translateX(-52%) translateY(2px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>

<body>

  <video id="camera" autoplay playsinline muted></video>

  <div class="panel">
    <h1>Guardián del Teclado AR</h1>
    <p>Activa la cámara y apunta la zona roja hacia el teclado.</p>

    <button id="startCamera">
      Activar cámara
    </button>

    <p id="status">Cámara apagada.</p>

    <div class="sensitivity-box">
      Sensibilidad del movimiento
      <input id="sensitivity" type="range" min="2" max="18" value="7">
    </div>
  </div>

  <div id="guardian" class="guardian idle">
    🐶🗡️
  </div>

  <div id="keyboardZone" class="keyboard-zone">
    <span>
      ZONA PROTEGIDA DEL TECLADO<br>
      si algo se mueve aquí, ataco
    </span>
  </div>

  <div id="slash" class="slash"></div>

  <div id="warning" class="warning">
    ¡NO TOQUES EL TECLADO!
  </div>

  <script>
    const video = document.getElementById("camera");
    const button = document.getElementById("startCamera");
    const statusText = document.getElementById("status");
    const sensitivityInput = document.getElementById("sensitivity");

    const keyboardZone = document.getElementById("keyboardZone");
    const guardian = document.getElementById("guardian");
    const slash = document.getElementById("slash");
    const warning = document.getElementById("warning");

    const motionCanvas = document.createElement("canvas");
    const motionCtx = motionCanvas.getContext("2d", {
      willReadFrequently: true
    });

    let cameraStarted = false;
    let previousFrame = null;
    let attacking = false;
    let lastAttackTime = 0;
    let calibrationFrames = 0;

    function setupMotionCanvas() {
      motionCanvas.width = 180;
      motionCanvas.height = Math.round(180 * window.innerHeight / window.innerWidth);
    }

    setupMotionCanvas();
    window.addEventListener("resize", setupMotionCanvas);

    async function startCamera() {
      try {
        statusText.textContent = "Solicitando permiso de cámara...";

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          statusText.textContent = "Tu navegador no permite usar cámara aquí. Usa Chrome con HTTPS.";
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {
              ideal: "environment"
            },
            width: {
              ideal: 1280
            },
            height: {
              ideal: 720
            }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        cameraStarted = true;
        button.style.display = "none";
        statusText.textContent = "Cámara activa. Calibrando zona protegida...";

        setTimeout(() => {
          statusText.textContent = "Listo. Acerca la mano u objeto al teclado.";
          detectMotion();
        }, 900);

      } catch (error) {
        console.error("Error al abrir cámara:", error);

        if (error.name === "NotAllowedError") {
          statusText.textContent = "Permiso denegado. Debes permitir acceso a la cámara.";
        } else if (error.name === "NotFoundError") {
          statusText.textContent = "No se encontró cámara disponible.";
        } else {
          statusText.textContent = "Error al abrir la cámara. Revisa permisos o HTTPS.";
        }
      }
    }

    function detectMotion() {
      if (!cameraStarted || video.readyState < 2) {
        requestAnimationFrame(detectMotion);
        return;
      }

      drawVideoCoverToCanvas();

      const zone = getKeyboardZoneInCanvas();

      if (zone.width <= 0 || zone.height <= 0) {
        requestAnimationFrame(detectMotion);
        return;
      }

      const currentFrame = motionCtx.getImageData(
        zone.x,
        zone.y,
        zone.width,
        zone.height
      );

      if (!previousFrame) {
        previousFrame = currentFrame;
        requestAnimationFrame(detectMotion);
        return;
      }

      const motionPercent = calculateMotionPercent(
        previousFrame.data,
        currentFrame.data
      );

      previousFrame = currentFrame;

      const sensitivity = Number(sensitivityInput.value);
      const threshold = sensitivity / 100;

      if (calibrationFrames < 12) {
        calibrationFrames++;
        statusText.textContent = "Calibrando movimiento...";
        requestAnimationFrame(detectMotion);
        return;
      }

      if (motionPercent > threshold) {
        keyboardZone.classList.add("danger");
        statusText.textContent =
          "Movimiento detectado en zona protegida: " +
          Math.round(motionPercent * 100) +
          "%";

        tryAttack();
      } else {
        keyboardZone.classList.remove("danger");
        statusText.textContent =
          "Vigilando teclado. Movimiento: " +
          Math.round(motionPercent * 100) +
          "%";
      }

      requestAnimationFrame(detectMotion);
    }

    function drawVideoCoverToCanvas() {
      const canvasWidth = motionCanvas.width;
      const canvasHeight = motionCanvas.height;

      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      if (!videoWidth || !videoHeight) return;

      const videoRatio = videoWidth / videoHeight;
      const canvasRatio = canvasWidth / canvasHeight;

      let sx = 0;
      let sy = 0;
      let sw = videoWidth;
      let sh = videoHeight;

      if (videoRatio > canvasRatio) {
        sh = videoHeight;
        sw = sh * canvasRatio;
        sx = (videoWidth - sw) / 2;
      } else {
        sw = videoWidth;
        sh = sw / canvasRatio;
        sy = (videoHeight - sh) / 2;
      }

      motionCtx.drawImage(
        video,
        sx,
        sy,
        sw,
        sh,
        0,
        0,
        canvasWidth,
        canvasHeight
      );
    }

    function getKeyboardZoneInCanvas() {
      const rect = keyboardZone.getBoundingClientRect();

      const scaleX = motionCanvas.width / window.innerWidth;
      const scaleY = motionCanvas.height / window.innerHeight;

      return {
        x: Math.max(0, Math.floor(rect.left * scaleX)),
        y: Math.max(0, Math.floor(rect.top * scaleY)),
        width: Math.min(
          motionCanvas.width,
          Math.floor(rect.width * scaleX)
        ),
        height: Math.min(
          motionCanvas.height,
          Math.floor(rect.height * scaleY)
        )
      };
    }

    function calculateMotionPercent(previous, current) {
      let changedPixels = 0;
      let totalPixels = 0;

      for (let i = 0; i < current.length; i += 16) {
        const rDiff = Math.abs(current[i] - previous[i]);
        const gDiff = Math.abs(current[i + 1] - previous[i + 1]);
        const bDiff = Math.abs(current[i + 2] - previous[i + 2]);

        const diff = rDiff + gDiff + bDiff;

        if (diff > 70) {
          changedPixels++;
        }

        totalPixels++;
      }

      return changedPixels / totalPixels;
    }

    function tryAttack() {
      const now = Date.now();
      const cooldownMs = 1400;

      if (now - lastAttackTime < cooldownMs) {
        return;
      }

      lastAttackTime = now;
      attack();
    }

    function attack() {
      if (attacking) return;

      attacking = true;

      guardian.classList.remove("idle");
      guardian.classList.remove("attack");
      slash.classList.remove("show");
      warning.classList.remove("show");

      void guardian.offsetWidth;
      void slash.offsetWidth;

      guardian.classList.add("attack");
      slash.classList.add("show");
      warning.classList.add("show");

      setTimeout(() => {
        guardian.classList.remove("attack");
        guardian.classList.add("idle");
        slash.classList.remove("show");
        warning.classList.remove("show");
        attacking = false;
      }, 1100);
    }

    button.addEventListener("click", startCamera);

    keyboardZone.addEventListener("click", attack);
    keyboardZone.addEventListener("touchstart", attack);
  </script>

</body>
</html>
