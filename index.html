<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guardián del Teclado AR</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #camera {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    #threeCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 17;
      pointer-events: none;
    }

    .panel {
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      width: 92%;
      max-width: 430px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      text-align: center;
      z-index: 30;
      backdrop-filter: blur(8px);
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .panel p {
      margin: 6px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: white;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .secondary-button {
    background: rgba(255, 255, 255, 0.18);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.45);
    }

    button:active {
      transform: scale(0.97);
    }

    #status {
      margin-top: 10px;
      color: #ddd;
      font-size: 13px;
    }

    .sensitivity-box {
      margin-top: 10px;
      font-size: 13px;
      color: #eee;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 6px;
    }

    .keyboard-zone {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 96%;
      height: 45%;
      border: 4px dashed rgba(255, 50, 50, 0.95);
      border-radius: 24px 24px 0 0;
      background: rgba(255, 0, 0, 0.16);
      color: white;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      font-size: 19px;
      text-shadow: 0 2px 5px black;
      pointer-events: none;
    }

    .keyboard-zone.danger {
      background: rgba(255, 0, 0, 0.35);
      border-color: white;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.95);
    }

    .keyboard-zone span {
      background: rgba(0, 0, 0, 0.68);
      padding: 12px 16px;
      border-radius: 14px;
    }

    .guardian {
      position: fixed;
      left: 50%;
      bottom: 48%;
      transform: translateX(-50%);
      font-size: 82px;
      z-index: 18;
      filter: drop-shadow(0 6px 10px black);
      pointer-events: none;
      display: none;
    }

    .guardian.idle {
      animation: floating 1.8s infinite ease-in-out;
    }

    @keyframes floating {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }

    .guardian.attack {
      animation: swordAttack 0.9s ease-in-out;
    }

    @keyframes swordAttack {
      0% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
      25% {
        transform: translateX(-95%) translateY(30px) scale(1.25) rotate(-25deg);
      }
      50% {
        transform: translateX(10%) translateY(80px) scale(1.55) rotate(25deg);
      }
      75% {
        transform: translateX(-50%) translateY(25px) scale(1.2) rotate(-10deg);
      }
      100% {
        transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
      }
    }

    .slash {
      position: fixed;
      left: 50%;
      bottom: 25%;
      transform: translateX(-50%) rotate(-25deg);
      width: 230px;
      height: 35px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 18px white,
        0 0 35px rgba(255, 0, 0, 0.95);
      z-index: 19;
      opacity: 0;
      pointer-events: none;
    }

    .slash.show {
      animation: slashEffect 0.35s ease-out;
    }

    @keyframes slashEffect {
      0% {
        opacity: 0;
        width: 60px;
      }
      40% {
        opacity: 1;
        width: 260px;
      }
      100% {
        opacity: 0;
        width: 300px;
      }
    }

    .warning {
      position: fixed;
      left: 50%;
      top: 39%;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.86);
      color: #ff4b4b;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      z-index: 40;
      display: none;
      text-shadow: 0 2px 4px black;
      pointer-events: none;
    }

    .warning.show {
      display: block;
      animation: shake 0.18s infinite;
    }

    @keyframes shake {
      0% {
        transform: translateX(-50%) translateY(0);
      }
      25% {
        transform: translateX(-52%) translateY(-2px);
      }
      50% {
        transform: translateX(-48%) translateY(2px);
      }
      75% {
        transform: translateX(-52%) translateY(2px);
      }
      100% {
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
  <script type="module" crossorigin src="/guardian-teclado/assets/index-mdBr6RQr.js"></script>
</head>

<body>

  <video id="camera" autoplay playsinline muted></video>

  <canvas id="threeCanvas"></canvas>

  <div class="panel">
    <h1>Guardián del Teclado AR</h1>
    <p>Activa la cámara y apunta la zona roja hacia el teclado.</p>

    <button id="startCamera">
      Activar cámara
    </button>

    <button id="recalibrateButton" class="secondary-button" style="display: none;">
        Recalibrar zona
    </button>

    <p id="status">Cámara apagada.</p>

    <div class="sensitivity-box">
      Sensibilidad del movimiento
      <input id="sensitivity" type="range" min="2" max="18" value="7">
    </div>
  </div>

  <div id="guardian" class="guardian idle">
    🐶🗡️
  </div>

  <div id="keyboardZone" class="keyboard-zone">
    <span>
      ZONA PROTEGIDA DEL TECLADO<br>
      si algo se mueve aquí, ataco
    </span>
  </div>

  <div id="slash" class="slash"></div>

  <div id="warning" class="warning">
    ¡NO TOQUES EL TECLADO!
  </div>

  </script>

</body>
</html>
